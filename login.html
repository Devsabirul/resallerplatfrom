<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>লগইন - লোকাল অ্যাফিলিয়েট</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #00c67a;
        --green-dark: #009a5e;
        --dark: #0a1628;
        --dark2: #112240;
        --mid: #1e3a5f;
        --text: #cdd6f4;
        --text-muted: #8892b0;
        --white: #fff;
        --radius: 16px;
        --error: #ef4444;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Hind Siliguri", sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background-image: radial-gradient(
          ellipse 60% 50% at 50% 0%,
          rgba(0, 198, 122, 0.1) 0%,
          transparent 70%
        );
      }
      .auth-box {
        background: var(--dark2);
        border: 1px solid rgba(0, 198, 122, 0.2);
        border-radius: 24px;
        padding: 48px 40px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }
      .logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .logo a {
        font-family: "Tiro Bangla", serif;
        font-size: 24px;
        color: var(--green);
        text-decoration: none;
        font-weight: 700;
      }
      h2 {
        font-family: "Tiro Bangla", serif;
        font-size: 28px;
        color: var(--white);
        text-align: center;
        margin-bottom: 8px;
      }
      .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: var(--white);
        font-family: "Hind Siliguri", sans-serif;
        font-size: 15px;
        transition: all 0.2s;
        outline: none;
      }
      input:focus {
        border-color: var(--green);
        background: rgba(0, 198, 122, 0.05);
      }
      input::placeholder {
        color: var(--text-muted);
      }
      .btn-submit {
        width: 100%;
        padding: 15px;
        background: var(--green);
        color: var(--dark);
        font-family: "Hind Siliguri", sans-serif;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
      }
      .btn-submit:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
      }
      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-muted);
      }
      .auth-footer a {
        color: var(--green);
        text-decoration: none;
        font-weight: 500;
      }
      .error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }
      .divider span {
        color: var(--text-muted);
        font-size: 13px;
        white-space: nowrap;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      @media (max-width: 480px) {
        .auth-box {
          padding: 36px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-box">
      <div class="logo"><a href="index.html"> লোকাল অ্যাফিলিয়েট</a></div>
      <h2>স্বাগতম</h2>
      <p class="subtitle">আপনার অ্যাকাউন্টে লগইন করুন</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label for="email">ইমেইল ঠিকানা</label>
        <input type="email" id="email" placeholder="আপনার ইমেইল লিখুন" />
      </div>
      <div class="form-group">
        <label for="password">পাসওয়ার্ড</label>
        <input type="password" id="password" placeholder="পাসওয়ার্ড লিখুন" />
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        লগইন করুন
      </button>

      <div class="auth-footer" style="margin-top: 16px">
        <a href="#">পাসওয়ার্ড ভুলে গেছেন?</a>
      </div>
      <div class="divider"><span>অথবা</span></div>
      <div class="auth-footer">
        নতুন ব্যবহারকারী? <a href="register.html">এখানে রেজিস্ট্রেশন করুন</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD2xtZZ9viQOxjmnYpzQhtjYne5l82FM3Y",
        authDomain: "bluedreamitaly.firebaseapp.com",
        projectId: "bluedreamitaly",
        storageBucket: "bluedreamitaly.firebasestorage.app",
        messagingSenderId: "145879085917",
        appId: "1:145879085917:web:938008da8d22839f7c6eb4",
        measurementId: "G-NX6V7GXSS1",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
      }

      window.handleLogin = async function () {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        if (!email || !password) {
          showError("সব তথ্য পূরণ করুন।");
          return;
        }

        btn.disabled = true;
        btn.textContent = "লগইন হচ্ছে...";

        try {
          const cred = await signInWithEmailAndPassword(auth, email, password);
          const snap = await getDoc(doc(db, "users", cred.user.uid));
          if (snap.exists() && snap.data().role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";
          }
        } catch (e) {
          const msgs = {
            "auth/user-not-found": "এই ইমেইলে কোনো অ্যাকাউন্ট নেই।",
            "auth/wrong-password": "পাসওয়ার্ড ভুল।",
            "auth/invalid-email": "সঠিক ইমেইল লিখুন।",
            "auth/too-many-requests":
              "অনেকবার চেষ্টা করা হয়েছে। কিছুক্ষণ পরে চেষ্টা করুন।",
            "auth/invalid-credential": "ইমেইল বা পাসওয়ার্ড ভুল।",
          };
          showError(msgs[e.code] || "লগইন ব্যর্থ হয়েছে। পুনরায় চেষ্টা করুন।");
          btn.disabled = false;
          btn.textContent = "লগইন করুন";
        }
      };

      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") window.handleLogin();
      });
      document.addEventListener("contextmenu", function (e) {
        e.preventDefault(); // ডিফল্ট রাইট ক্লিক বন্ধ
      });
    </script>
  </body>
</html>
