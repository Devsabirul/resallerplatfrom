<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>রেজিস্ট্রেশন - লোকাল অ্যাফিলিয়েট</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #00c67a;
        --green-dark: #009a5e;
        --dark: #0a1628;
        --dark2: #112240;
        --text: #cdd6f4;
        --text-muted: #8892b0;
        --white: #fff;
        --radius: 16px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Hind Siliguri", sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 20px;
        background-image: radial-gradient(
          ellipse 60% 50% at 50% 0%,
          rgba(0, 198, 122, 0.1) 0%,
          transparent 70%
        );
      }
      .auth-box {
        background: var(--dark2);
        border: 1px solid rgba(0, 198, 122, 0.2);
        border-radius: 24px;
        padding: 48px 40px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }
      .logo {
        text-align: center;
        margin-bottom: 28px;
      }
      .logo a {
        font-family: "Tiro Bangla", serif;
        font-size: 22px;
        color: var(--green);
        text-decoration: none;
        font-weight: 700;
      }
      h2 {
        font-family: "Tiro Bangla", serif;
        font-size: 26px;
        color: var(--white);
        text-align: center;
        margin-bottom: 6px;
      }
      .subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 28px;
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 7px;
      }
      .required {
        color: var(--green);
        margin-left: 3px;
      }
      input {
        width: 100%;
        padding: 13px 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: var(--white);
        font-family: "Hind Siliguri", sans-serif;
        font-size: 15px;
        transition: all 0.2s;
        outline: none;
      }
      input:focus {
        border-color: var(--green);
        background: rgba(0, 198, 122, 0.05);
      }
      input::placeholder {
        color: var(--text-muted);
        font-size: 14px;
      }
      .optional-badge {
        font-size: 11px;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.07);
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: 6px;
        font-weight: 400;
      }
      .btn-submit {
        width: 100%;
        padding: 15px;
        background: var(--green);
        color: var(--dark);
        font-family: "Hind Siliguri", sans-serif;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
      }
      .btn-submit:hover {
        background: var(--green-dark);
        transform: translateY(-1px);
      }
      .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 16px;
        display: none;
      }
      .success-msg {
        background: rgba(0, 198, 122, 0.1);
        border: 1px solid rgba(0, 198, 122, 0.3);
        color: #6ee7b7;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 16px;
        display: none;
        text-align: center;
      }
      .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: var(--text-muted);
      }
      .auth-footer a {
        color: var(--green);
        text-decoration: none;
        font-weight: 500;
      }
      .referral-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
      }
      @media (max-width: 480px) {
        .auth-box {
          padding: 32px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-box">
      <div class="logo"><a href="index.html">লোকাল অ্যাফিলিয়েট</a></div>
      <h2>রেজিস্ট্রেশন করুন</h2>
      <p class="subtitle">বিনামূল্যে অ্যাকাউন্ট তৈরি করুন</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label for="name">পূর্ণ নাম <span class="required">*</span></label>
        <input type="text" id="name" placeholder="আপনার পুরো নাম লিখুন" />
      </div>
      <div class="form-group">
        <label for="email">ইমেইল <span class="required">*</span></label>
        <input type="email" id="email" placeholder="আপনার ইমেইল লিখুন" />
      </div>
      <div class="form-group">
        <label for="phone">ফোন নাম্বার <span class="required">*</span></label>
        <input type="tel" id="phone" placeholder="+39 বা +880 সহ নম্বর লিখুন" />
      </div>
      <div class="form-group">
        <label for="password">পাসওয়ার্ড <span class="required">*</span></label>
        <input type="password" id="password" placeholder="কমপক্ষে ৬ অক্ষর" />
      </div>
      <div class="form-group">
        <label for="referCode"
          >রেফার আইডি <span class="optional-badge">ঐচ্ছিক</span></label
        >
        <input
          type="text"
          id="referCode"
          placeholder="যেমন: BDABCD12"
          style="text-transform: uppercase"
        />
        <p class="referral-hint">কেউ আপনাকে রেফার করলে তার আইডি দিন</p>
      </div>

      <button class="btn-submit" id="regBtn" onclick="handleRegister()">
        অ্যাকাউন্ট তৈরি করুন
      </button>

      <div class="auth-footer">
        ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        collection,
        query,
        where,
        getDocs,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD2xtZZ9viQOxjmnYpzQhtjYne5l82FM3Y",
        authDomain: "bluedreamitaly.firebaseapp.com",
        projectId: "bluedreamitaly",
        storageBucket: "bluedreamitaly.firebasestorage.app",
        messagingSenderId: "145879085917",
        appId: "1:145879085917:web:938008da8d22839f7c6eb4",
        measurementId: "G-NX6V7GXSS1",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      function generateReferralId() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let r = "BD";
        for (let i = 0; i < 6; i++)
          r += chars[Math.floor(Math.random() * chars.length)];
        return r;
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        document.getElementById("successMsg").style.display = "none";
        el.textContent = msg;
        el.style.display = "block";
      }
      function showSuccess(msg) {
        const el = document.getElementById("successMsg");
        document.getElementById("errorMsg").style.display = "none";
        el.textContent = msg;
        el.style.display = "block";
      }

      window.handleRegister = async function () {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const referCode = document
          .getElementById("referCode")
          .value.trim()
          .toUpperCase();
        const btn = document.getElementById("regBtn");

        if (!name || !email || !phone || !password) {
          showError("সব তারকা (*) চিহ্নিত তথ্য পূরণ করুন।");
          return;
        }
        if (password.length < 6) {
          showError("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।");
          return;
        }

        btn.disabled = true;
        btn.textContent = "অ্যাকাউন্ট তৈরি হচ্ছে...";

        try {
          // Validate referral code if provided
          let referredBy = "";
          if (referCode) {
            const q = query(
              collection(db, "users"),
              where("myReferralId", "==", referCode),
            );
            const snap = await getDocs(q);
            if (snap.empty) {
              showError("রেফার আইডি সঠিক নয়।");
              btn.disabled = false;
              btn.textContent = "অ্যাকাউন্ট তৈরি করুন";
              return;
            }
            referredBy = referCode;
          }

          // Generate unique referral ID
          let myReferralId;
          let isUnique = false;
          while (!isUnique) {
            myReferralId = generateReferralId();
            const q2 = query(
              collection(db, "users"),
              where("myReferralId", "==", myReferralId),
            );
            const snap2 = await getDocs(q2);
            if (snap2.empty) isUnique = true;
          }

          const cred = await createUserWithEmailAndPassword(
            auth,
            email,
            password,
          );
          await setDoc(doc(db, "users", cred.user.uid), {
            uid: cred.user.uid,
            name,
            email,
            phone,
            myReferralId,
            referredBy,
            role: "user",
            totalSales: 0,
            totalOrders: 0,
            totalEarnings: 0,
            pendingPayment: 0,
            createdAt: serverTimestamp(),
          });

          showSuccess(
            `✅ অ্যাকাউন্ট তৈরি সফল! আপনার রেফার আইডি: ${myReferralId} — ড্যাশবোর্ডে যাচ্ছেন...`,
          );
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2500);
        } catch (e) {
          const msgs = {
            "auth/email-already-in-use": "এই ইমেইল ইতিমধ্যে ব্যবহার হয়েছে।",
            "auth/invalid-email": "সঠিক ইমেইল লিখুন।",
            "auth/weak-password": "পাসওয়ার্ড আরও শক্তিশালী করুন।",
          };
          showError(
            msgs[e.code] || "রেজিস্ট্রেশন ব্যর্থ হয়েছে। পুনরায় চেষ্টা করুন।",
          );
          btn.disabled = false;
          btn.textContent = "অ্যাকাউন্ট তৈরি করুন";
        }
      };
      document.addEventListener("contextmenu", function (e) {
        e.preventDefault(); // ডিফল্ট রাইট ক্লিক বন্ধ
      });
    </script>
  </body>
</html>
